<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Escena 360 - Escena 4</title>
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
</head>

<body>
  <a-scene>

    <a-assets>
      <img id="lugar4" src="/assets/img360/lugar4.jpg">
      <img id="estrella" src="/assets/icon/estrella.png">

      <audio id="ambiente" src="assets/audio/ambiente.MP3" preload="auto"></audio>
      <audio id="hover" src="../assets/audio/hover.MP3" preload="auto"></audio>
      <audio id="transicion" src="../assets/audio/transicion.MP3" preload="auto"></audio>
    </a-assets>

    <a-entity id="musicaFondo" 
       sound="src: #ambiente; autoplay: true; loop: true; volume: 0.5">
    </a-entity>


    <a-sky src="#lugar4"></a-sky>

    <a-image id="portal"
      src="#estrella"
      position="0 1 3"
      scale="0.4 0.4 0.4"
      class="clickable"
      animation="property: position; dir: alternate; dur: 1200; loop: true; to: 0 1.4 3"
      animation__hover="startEvents: mouseenter; property: scale; to: 0.7 0.7 0.7; dur: 300"
      animation__leave="startEvents: mouseleave; property: scale; to: 0.4 0.4 0.4; dur: 300"
      sound="src: #hover; on: mouseenter; volume: 1">
    </a-image>

    <a-camera>
      <a-cursor 
        fuse="true"
        fuse-timeout="2000"
        material="color: white; shader: flat"
        geometry="primitive: ring; radiusInner: 0.01; radiusOuter: 0.02">
      </a-cursor>

      <a-entity id="ui-label" position="3 -1.3 -2">
        <a-plane 
          id="barra"
          width="2"
          height="0.4"
          color="black"
          opacity="0.6"
          position="0 0 0"
          animation__in="property: position; from: 2 0 0; to: 0 0 0; dur: 800; easing: easeOutQuad"
          animation__out="property: position; to: 2 0 0; dur: 800; easing: easeInQuad; delay: 6000">
        </a-plane>

        <a-text 
          id="textoLugar"
          value="Apacheta Chucura"
          position="-0.9 0 0.01"
          align="left"
          color="white"
          opacity="0"
          width="2"
          animation__fadein="property: opacity; from: 0; to: 1; dur: 1000; delay: 00"
          animation__fadeout="property: opacity; from: 1; to: 0; dur: 800; delay: 5000">
        </a-text>
      </a-entity>
    </a-camera>

  </a-scene>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const scene = document.querySelector("a-scene");
      const portal = document.querySelector("#portal");
      const fondo = document.querySelector("#musicaFondo");

      // Forzar inicio de audio al interactuar
      scene.addEventListener("click", () => {
        if (fondo.components.sound) {
          fondo.components.sound.playSound();
        }
      }, { once: true });

      // Volver a la escena 1
      portal.addEventListener("click", () => {
        window.location.href = "escena1.html";
      });
    });
  </script>

</body>
</html>
